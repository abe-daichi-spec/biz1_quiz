<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビジネス文書検定1級 用語マスター RPG</title>
  <style>
    :root {
      --primary:#007bff; --success:#28a745; --danger:#dc3545;
      --bg:#f4f7f9; --card-bg:#ffffff; --border:#ddd; --muted:#888; --radius:14px;
      --c1-bg:#eef6ff; --c1-bd:#b7d7ff; --c1-tx:#004488;
      --c2-bg:#f3efff; --c2-bd:#d2c6ff; --c2-tx:#330088;
      --c3-bg:#fff2f2; --c3-bd:#ffc2c2; --c3-tx:#880000;
      --c4-bg:#fff7e6; --c4-bd:#ffd08a; --c4-tx:#884400;
      --c5-bg:#effff4; --c5-bd:#b7f0c6; --c5-tx:#006622;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:var(--bg);min-height:100vh;padding:14px 12px 48px;}
    .page-header{max-width:680px;margin:0 auto 10px;}
    .page-header h1{font-size:19px;font-weight:800;}
    .page-header p{font-size:12px;color:var(--muted);margin-top:3px;}
    .card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:0 4px 14px rgba(0,0,0,.07);max-width:680px;margin:0 auto 14px;}
    .status-bar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:2px solid #333;margin-bottom:14px;background:linear-gradient(270deg,#ffe6e6,#e6f0ff,#e6ffe6,#fffde6);background-size:800% 800%;animation:bgAnim 16s ease infinite;}
    @keyframes bgAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .char-icon{font-size:42px;animation:bounce 2s infinite;flex-shrink:0;}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .char-info{flex:1;min-width:0;}
    .char-name{font-weight:800;font-size:15px;color:#333;}
    .char-next{font-size:11px;color:#555;margin-top:2px;}
    #playerName{font-size:14px;padding:5px 8px;margin-bottom:5px;width:100%;max-width:200px;border:2px solid #ccc;border-radius:6px;font-weight:bold;display:block;}
    #playerName:read-only{background:#eee;color:#555;border-color:#ddd;}
    .stat-block{text-align:right;flex-shrink:0;}
    .stat-block .num{font-weight:800;font-size:20px;}
    .stat-block .lbl{font-size:11px;color:var(--muted);}
    .mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
    .mini-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,.05);}
    .mini-box .val{font-size:18px;font-weight:800;display:block;}
    .mini-box .lbl{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;margin-bottom:12px;}
    select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-family:inherit;}
    button{border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .16s;font-family:inherit;}
    button:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.1);}
    .act-btn{padding:8px 14px;font-weight:700;color:#444;font-size:13px;}
    #mistakeBtn{color:#c33;border-color:#fcc;background:#fff5f5;font-weight:bold;display:none;}
    .pdf-btn{background:#e8f0fe;border-color:#7baaf7;color:#1a56db;}
    .pdf-btn:hover{background:#d2e3fc;}
    .prog-wrap{background:#eee;border-radius:99px;height:8px;margin-bottom:14px;overflow:hidden;}
    .prog-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),#00c6ff);transition:width .4s ease;width:0%;}
    .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .cat-tag{font-size:11px;background:#eee;padding:3px 10px;border-radius:99px;color:#555;}
    .q-count{font-size:12px;color:var(--muted);}
    .q-box{background:#f8faff;border:2px solid #d0e4ff;border-radius:12px;padding:16px 18px;margin-bottom:14px;min-height:80px;display:flex;align-items:center;justify-content:center;text-align:center;}
    .q-text{font-size:15px;font-weight:700;line-height:1.65;color:#1a2a4a;}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    @media(max-width:460px){.choices{grid-template-columns:1fr;}}
    .c-btn{padding:13px 10px;min-height:52px;font-size:13px;font-weight:700;line-height:1.3;border-radius:12px;text-align:center;transition:all .14s;}
    .c-btn:disabled{cursor:default;transform:none !important;box-shadow:none !important;}
    .c-btn.correct{background:#d4edda !important;border-color:#28a745 !important;color:#155724 !important;box-shadow:0 0 0 3px #28a74540 !important;}
    .c-btn.wrong{background:#f8d7da !important;border-color:#dc3545 !important;color:#721c24 !important;}
    .col-1{background:var(--c1-bg);border-color:var(--c1-bd);color:var(--c1-tx);}
    .col-2{background:var(--c2-bg);border-color:var(--c2-bd);color:var(--c2-tx);}
    .col-3{background:var(--c3-bg);border-color:var(--c3-bd);color:var(--c3-tx);}
    .col-4{background:var(--c4-bg);border-color:var(--c4-bd);color:var(--c4-tx);}
    .col-5{background:var(--c5-bg);border-color:var(--c5-bd);color:var(--c5-tx);}
    #resultMsg{font-size:15px;font-weight:700;min-height:1.6em;margin-bottom:4px;}
    .ok{color:var(--success);font-weight:900;}
    .ng{color:var(--danger);font-weight:900;}
    #stageClear{display:none;text-align:center;padding:26px 0;}
    #stageClear .big-ico{font-size:56px;}
    #stageClear h2{font-size:20px;font-weight:800;margin:10px 0 6px;}
    #stageClear .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
    .next-btn{background:#333;color:#fff;padding:12px 26px;font-size:14px;font-weight:700;border-radius:12px;border:none;cursor:pointer;}
    .next-btn:hover{background:#555;}
    .summary{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;padding-top:12px;border-top:1px solid #eee;margin-top:12px;font-size:13px;color:var(--muted);}
    #pdfModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:300;padding:16px;}
    .pdf-modal-inner{background:#fff;max-width:760px;height:calc(100vh - 32px);margin:0 auto;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.3);}
    .pdf-modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid #eee;flex-shrink:0;}
    .pdf-modal-header h3{font-size:14px;font-weight:800;}
    .pdf-close-btn{font-size:22px;border:none;background:none;cursor:pointer;line-height:1;}
    .pdf-modal-body{flex:1;overflow:hidden;}
    .pdf-modal-body iframe{width:100%;height:100%;border:none;}
    #mistakeModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;padding:20px;overflow-y:auto;}
    .modal-inner{background:#fff;max-width:500px;margin:40px auto;padding:22px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
    .modal-inner h3{margin-bottom:10px;}
    .m-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #eee;gap:8px;}
    .m-item:last-child{border:none;}
    .m-name{font-weight:bold;font-size:14px;}
    .m-cat{font-size:11px;color:#0a7;}
    .del-btn{font-size:11px;padding:4px 10px;border:1px solid #ccc;background:#f0f0f0;border-radius:6px;white-space:nowrap;cursor:pointer;}
  </style>
</head>
<body>

<div class="page-header">
  <h1>📄 ビジネス文書検定1級 用語マスター RPG</h1>
  <p>説明を読んで正しい用語を4択から選ぼう！間違えると苦手リストへ自動登録。</p>
</div>

<div class="card">
  <div class="status-bar">
    <div class="char-icon" id="charIcon">🥚</div>
    <div class="char-info">
      <input type="text" id="playerName" placeholder="名前を入力（必須）" onblur="lockName()">
      <div class="char-name" id="charName">Lv.1 まなびのたまご</div>
      <div class="char-next" id="charNext">あと ? 問で進化</div>
    </div>
    <div class="stat-block">
      <div class="lbl">累計正解</div>
      <div class="num"><span id="totalAcc">0</span>問</div>
    </div>
  </div>

  <div class="mini-stats">
    <div class="mini-box"><span class="val" id="sLearned">0</span><span class="lbl">習得済（<span id="sTotal">0</span>語中）</span></div>
    <div class="mini-box"><span class="val" id="sUnlearned">0</span><span class="lbl">未習得</span></div>
    <div class="mini-box"><span class="val" id="sPct">0%</span><span class="lbl">達成率</span></div>
  </div>

  <div class="toolbar">
    <select id="catSel" onchange="onFilterChange()">
      <option value="all">全カテゴリ</option>
      <option value="一般・キー操作・出力">① 一般・キー操作・出力</option>
      <option value="編集・記憶">② 編集・記憶</option>
      <option value="電子メール">③ 電子メール</option>
      <option value="文書・文章表現・文書の種類">④ 文書・文章表現・文書の種類</option>
      <option value="プレゼンテーション">⑤ プレゼンテーション</option>
    </select>
    <select id="modeSel" onchange="onFilterChange()">
      <option value="all">すべて</option>
      <option value="unlearned">未習得のみ</option>
      <option value="learned">習得済のみ</option>
    </select>
    <button id="mistakeBtn" class="act-btn" onclick="openMistake()">⚠️ 苦手（<span id="mistakeCnt">0</span>）</button>
    <button class="act-btn pdf-btn" onclick="openPdf()">📄 用語リストを見る</button>
  </div>

  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>

  <div id="quizArea">
    <div class="q-meta">
      <span class="cat-tag" id="qCat">—</span>
      <span class="q-count" id="qCount">— / —</span>
    </div>
    <div class="q-box">
      <div class="q-text" id="qText">カテゴリを選ぶか、そのままスタート！</div>
    </div>
    <div class="choices" id="choicesGrid"></div>
    <div id="resultMsg"></div>
  </div>

  <div id="stageClear">
    <div class="big-ico">🎉</div>
    <h2>ステージクリア！</h2>
    <div class="sub" id="clearSub"></div>
    <button class="next-btn" onclick="nextLap()">次のステージへ ▶</button>
  </div>

  <div class="summary">
    <span>今回：<span id="sc">0</span> / <span id="tc">0</span> 問正解</span>
    <span style="margin-left:auto;">残り <span id="remQ">0</span> 問 ／ <span id="lapNum">0</span> 周目</span>
    <button class="act-btn" onclick="skipQ()">スキップ</button>
    <button class="act-btn" onclick="resetAll()" style="color:#c33;">リセット</button>
  </div>
</div>

<!-- PDF モーダル -->
<div id="pdfModal" onclick="closePdfOutside(event)">
  <div class="pdf-modal-inner">
    <div class="pdf-modal-header">
      <h3>📄 ビジネス文書検定1級 用語と説明リスト</h3>
      <button class="pdf-close-btn" onclick="closePdf()">✕</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdfFrame" src="" title="用語リストPDF"></iframe>
    </div>
  </div>
</div>

<!-- 苦手リストモーダル -->
<div id="mistakeModal">
  <div class="modal-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3>📝 苦手リスト</h3>
      <button onclick="closeMistake()" style="font-size:20px;border:none;background:none;cursor:pointer;">✕</button>
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:10px;">間違えた問題が自動追加されます。</p>
    <div id="mistakeList" style="max-height:320px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:8px;"></div>
    <div style="margin-top:16px;text-align:center;">
      <button class="act-btn" onclick="closeMistake()">閉じる</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   問題データ（PDFの用語・説明をそのまま収録）
   q = 説明文（問題文）  a = 正解用語  w = 不正解3択
============================================================ */
const DATA = [

  /* ① 一般・キー操作・出力 */
  {cat:"一般・キー操作・出力",q:"卓上出版のこと。文字・図形・画像などのデータをパソコンなどで編集・レイアウトし、印刷物の製作を行うこと。",a:"DTP",w:["VDT障害","USBハブ","プロパティ"]},
  {cat:"一般・キー操作・出力",q:"アイコンやプログラムなど、オブジェクトの属性や設定内容のこと。",a:"プロパティ",w:["デフォルトの設定","ユーザの設定","DTP"]},
  {cat:"一般・キー操作・出力",q:"入力方法や書式設定など、初期状態で設定されている内容のこと。",a:"デフォルトの設定",w:["ユーザの設定","プロパティ","DTP"]},
  {cat:"一般・キー操作・出力",q:"利用者が自分の好みに合わせて変更した設定のこと。",a:"ユーザの設定",w:["デフォルトの設定","プロパティ","DTP"]},
  {cat:"一般・キー操作・出力",q:"長時間のVDT作業などによって起こる、眼精疲労・腰痛・肩こりなどの健康上の問題。",a:"VDT障害",w:["DTP","USBポート","USBハブ"]},
  {cat:"一般・キー操作・出力",q:"パソコンのインターフェースの一つで、USB機器を接続する接続口のこと。",a:"USBポート",w:["USBハブ","VDT障害","DTP"]},
  {cat:"一般・キー操作・出力",q:"複数のUSB機器を接続するため、USB接続口を増やす装置のこと。",a:"USBハブ",w:["USBポート","VDT障害","プロパティ"]},
  {cat:"一般・キー操作・出力",q:"すべてを選択するショートカットキーはどれか。",a:"Ctrl＋A",w:["Ctrl＋B","Ctrl＋N","Ctrl＋S"]},
  {cat:"一般・キー操作・出力",q:"太字にするショートカットキーはどれか。",a:"Ctrl＋B",w:["Ctrl＋I","Ctrl＋U","Ctrl＋A"]},
  {cat:"一般・キー操作・出力",q:"斜体にするショートカットキーはどれか。",a:"Ctrl＋I",w:["Ctrl＋B","Ctrl＋U","Ctrl＋N"]},
  {cat:"一般・キー操作・出力",q:"新規作成をするショートカットキーはどれか。",a:"Ctrl＋N",w:["Ctrl＋O","Ctrl＋S","Ctrl＋A"]},
  {cat:"一般・キー操作・出力",q:"ファイルを開くショートカットキーはどれか。",a:"Ctrl＋O",w:["Ctrl＋N","Ctrl＋S","Ctrl＋A"]},
  {cat:"一般・キー操作・出力",q:"上書き保存をするショートカットキーはどれか。",a:"Ctrl＋S",w:["Ctrl＋O","Ctrl＋N","Ctrl＋U"]},
  {cat:"一般・キー操作・出力",q:"下線を付けるショートカットキーはどれか。",a:"Ctrl＋U",w:["Ctrl＋B","Ctrl＋I","Ctrl＋S"]},
  {cat:"一般・キー操作・出力",q:"日本語入力システムを切り替えるショートカットキーはどれか。",a:"Ctrl＋Shift",w:["Alt＋F4","Alt＋X","Ctrl＋S"]},
  {cat:"一般・キー操作・出力",q:"操作中のソフトを終了するショートカットキーはどれか。",a:"Alt＋F4",w:["Alt＋X","Ctrl＋Shift","Ctrl＋N"]},
  {cat:"一般・キー操作・出力",q:"Unicodeの文字コードと文字を相互変換するショートカットキーはどれか。",a:"Alt＋X",w:["Alt＋F4","Ctrl＋Shift","Ctrl＋U"]},
  {cat:"一般・キー操作・出力",q:"画面上に複数の作業領域を表示し、同時に作業できる機能のこと。",a:"マルチウィンドウ",w:["バックグラウンド印刷","ヘッダー","差し込み印刷"]},
  {cat:"一般・キー操作・出力",q:"文書のある位置へすぐ移動できるようにする機能。",a:"文頭",w:["ヘッダー","フッター","マルチウィンドウ"]},
  {cat:"一般・キー操作・出力",q:"文書の上部に、文書名・日付・ページ番号などを印刷する機能のこと。",a:"ヘッダー",w:["フッター","文頭","差し込み印刷"]},
  {cat:"一般・キー操作・出力",q:"文書の下部に、文書名・日付・ページ番号などを印刷する機能のこと。",a:"フッター",w:["ヘッダー","文頭","差し込み印刷"]},
  {cat:"一般・キー操作・出力",q:"氏名や住所などのデータを、指定した位置に差し込んで印刷する機能のこと。",a:"差し込み印刷",w:["部単位印刷","バックグラウンド印刷","ヘッダー"]},
  {cat:"一般・キー操作・出力",q:"他の作業と並行して印刷できる機能のこと。",a:"バックグラウンド印刷",w:["差し込み印刷","部単位印刷","マルチウィンドウ"]},
  {cat:"一般・キー操作・出力",q:"複数ページの文書を、1部ずつまとめて印刷する方法のこと。",a:"部単位印刷",w:["バックグラウンド印刷","差し込み印刷","ローカルプリンタ"]},
  {cat:"一般・キー操作・出力",q:"LANなどを経由せず、パソコンに直接接続されているプリンタのこと。",a:"ローカルプリンタ",w:["ネットワークプリンタ","部単位印刷","バックグラウンド印刷"]},
  {cat:"一般・キー操作・出力",q:"LANなどを経由して、パソコンと接続されているプリンタのこと。",a:"ネットワークプリンタ",w:["ローカルプリンタ","差し込み印刷","部単位印刷"]},
  {cat:"一般・キー操作・出力",q:"省資源のために再利用する、裏面が白紙の使用済み用紙のこと。",a:"裏紙",w:["偽造防止用紙","和文フォント","欧文フォント"]},
  {cat:"一般・キー操作・出力",q:"コピー機で複製すると、コピーであることが一目で分かるような用紙のこと。",a:"偽造防止用紙",w:["裏紙","和文フォント","欧文フォント"]},
  {cat:"一般・キー操作・出力",q:"日本語の文字デザインのこと。",a:"和文フォント",w:["欧文フォント","偽造防止用紙","裏紙"]},
  {cat:"一般・キー操作・出力",q:"英字など、欧文の文字デザインのこと。",a:"欧文フォント",w:["和文フォント","偽造防止用紙","裏紙"]},

  /* ② 編集・記憶 */
  {cat:"編集・記憶",q:"文書内の条件に合う文字列を探し、別の文字列に置き換えること。",a:"置換",w:["段落","ドロップキャップ","組み文字"]},
  {cat:"編集・記憶",q:"ある話題や内容について、行を改めて書かれた文章のまとまりのこと。",a:"段落",w:["置換","ドロップキャップ","箇条書き"]},
  {cat:"編集・記憶",q:"文頭の1文字を大きくし、強調する機能のこと。",a:"ドロップキャップ",w:["置換","段落","組み文字"]},
  {cat:"編集・記憶",q:"複数の文字を1文字分の枠の中に配置し、1文字として扱う機能のこと。",a:"組み文字",w:["外字","ドロップキャップ","Unicode"]},
  {cat:"編集・記憶",q:"ユーザーが作成して、システムに登録した文字のこと。",a:"外字",w:["組み文字","Unicode","JISコード"]},
  {cat:"編集・記憶",q:"まだ使う見込みのある文書を整理し、身近で管理すること。",a:"文書の保管",w:["文書の保存","文書の履歴管理","専門辞書"]},

function saveAll(){
  localStorage.setItem("biz_total", totalAcc);
  localStorage.setItem("biz_lrn",   JSON.stringify(learnedMap));
  localStorage.setItem("biz_mis",   JSON.stringify(mistakes));
  if(playerName) localStorage.setItem("biz_name", playerName);
}
function loadAll(){
  totalAcc   = parseInt(localStorage.getItem("biz_total")||"0",10);
  learnedMap = JSON.parse(localStorage.getItem("biz_lrn") ||"{}");
  mistakes   = JSON.parse(localStorage.getItem("biz_mis") ||"[]");
  const n=localStorage.getItem("biz_name");
  if(n){playerName=n;const el=document.getElementById("playerName");el.value=n;el.readOnly=true;}
}
function lockName(){
  const el=document.getElementById("playerName"),v=el.value.trim();
  if(v){playerName=v;el.readOnly=true;saveAll();}
}
function updateChar(){
  let ch=CHARS[0];
  for(const c of CHARS) if(totalAcc>=c.score) ch=c;
  document.getElementById("charIcon").textContent=ch.icon;
  document.getElementById("charName").textContent=ch.name;
  document.getElementById("totalAcc").textContent=totalAcc;
  const idx=CHARS.indexOf(ch);
  document.getElementById("charNext").textContent=
    idx<CHARS.length-1?`あと ${CHARS[idx+1].score-totalAcc} 問で進化`:"MAX レベル達成！";
}
function updateMini(){
  const total=DATA.length;
  const learned=DATA.filter(d=>learnedMap[d.a]).length;
  document.getElementById("sLearned").textContent=learned;
  document.getElementById("sTotal").textContent=total;
  document.getElementById("sUnlearned").textContent=total-learned;
  document.getElementById("sPct").textContent=Math.floor(learned/total*100)+"%";
}

  showQuizUI();
  let pool=DATA.filter(d=>{
    if(currentCat!=="all"&&d.cat!==currentCat) return false;
    if(currentMode==="learned"   &&!learnedMap[d.a]) return false;
    if(currentMode==="unlearned" && learnedMap[d.a]) return false;
    return true;
  });
  if(!pool.length){
    document.getElementById("qText").textContent="対象の問題がありません。フィルタを変えてみてください。";
    document.getElementById("choicesGrid").innerHTML="";
    updateMini();return;
  }
  shuffle(pool);
  deck=pool.slice(0,MAX_Q);
  deckIdx=0;lap++;count=0;correct=0;
  updateSummary();
  document.getElementById("lapNum").textContent=lap;
  showNext();
}
function showNext(){
  if(deckIdx>=deck.length){showClear();return;}
  current=deck[deckIdx];deckIdx++;
  answered=false;
  document.getElementById("qCat").textContent=current.cat;
  document.getElementById("qCount").textContent=`${deckIdx} / ${deck.length}`;
  document.getElementById("qText").textContent=current.q;
  document.getElementById("resultMsg").textContent="";
  updateProg(deckIdx,deck.length);
  buildChoices(current);
  updateSummary();
}
function buildChoices(item){
  const grid=document.getElementById("choicesGrid");
  grid.innerHTML="";
  const col=CAT_COL[item.cat]||"col-1";
  shuffleRet([item.a,...item.w]).forEach(ch=>{
    const btn=document.createElement("button");
    btn.className=`c-btn ${col}`;
    btn.textContent=ch;
    btn.onclick=()=>doAnswer(ch,btn);
    grid.appendChild(btn);
  });
}
function doAnswer(sel,btn){
  if(!current||answered)return;
  if(!playerName){alert("先に名前を入力してください！");return;}
  answered=true;
  const ok=sel===current.a;
  count++;
  document.querySelectorAll(".c-btn").forEach(b=>{
    b.disabled=true;
    if(b.textContent===current.a) b.classList.add("correct");
    else if(b===btn&&!ok)         b.classList.add("wrong");
  });
  if(ok){
    correct++;totalAcc++;
    learnedMap[current.a]=true;
    document.getElementById("resultMsg").innerHTML='<span class="ok">⭕ 正解！</span>';
  }else{
    learnedMap[current.a]=false;
    addMistake(current);
    document.getElementById("resultMsg").innerHTML=
      `<span class="ng">❌ 不正解</span>&nbsp;<span style="color:#555;font-size:12px;">正解：${current.a}</span>`;
  }
  saveAll();updateChar();updateMini();updateSummary();
  setTimeout(()=>{if(deckIdx<deck.length)showNext();else showClear();},ok?800:1800);
}
function skipQ(){if(deckIdx<deck.length)showNext();else showClear();}
function updateProg(cur,total){
  document.getElementById("progBar").style.width=(total?Math.round(cur/total*100):0)+"%";
}
function showClear(){
  document.getElementById("quizArea").style.display="none";
  document.getElementById("stageClear").style.display="block";
  document.getElementById("clearSub").textContent=`正解 ${correct} / ${count} 問 ／ ${lap}周目クリア！`;
  updateProg(deck.length,deck.length);
}
function showQuizUI(){
  document.getElementById("quizArea").style.display="block";
  document.getElementById("stageClear").style.display="none";
}
function nextLap(){showQuizUI();applyAndStart();}
function updateSummary(){
  document.getElementById("sc").textContent=correct;
  document.getElementById("tc").textContent=count;
  document.getElementById("remQ").textContent=Math.max(0,deck.length-deckIdx);
}
function addMistake(item){
  if(!mistakes.some(m=>m.a===item.a)){
    mistakes.push({a:item.a,cat:item.cat});
    saveAll();updateMistakeBtn();
  }
}
function removeMistake(a){
  mistakes=mistakes.filter(m=>m.a!==a);
  saveAll();updateMistakeBtn();renderMistakeList();
}
function updateMistakeBtn(){
  document.getElementById("mistakeCnt").textContent=mistakes.length;
  document.getElementById("mistakeBtn").style.display=mistakes.length>0?"inline-block":"none";
}
function openMistake(){renderMistakeList();document.getElementById("mistakeModal").style.display="block";}
function closeMistake(){document.getElementById("mistakeModal").style.display="none";}
function renderMistakeList(){
  const cont=document.getElementById("mistakeList");
  if(!mistakes.length){
    cont.innerHTML="<div style='text-align:center;padding:20px;'>苦手リストは空です！完璧！🎉</div>";
    return;
  }
  cont.innerHTML="";
  mistakes.forEach(m=>{
    const div=document.createElement("div");
    div.className="m-item";
    const safe=m.a.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    div.innerHTML=`<div><span class="m-name">${m.a}</span><span class="m-cat"> ／ ${m.cat}</span></div>
      <button class="del-btn" onclick="removeMistake('${safe}')">削除</button>`;
    cont.appendChild(div);
  });
}
/* PDF ★同フォルダにPDFを置いてください */
const PDF_FILE="ビジネス文書検定1級_用語と説明リスト.pdf";
function openPdf(){
  const f=document.getElementById("pdfFrame");
  if(!f.getAttribute("data-loaded")){f.src=PDF_FILE;f.setAttribute("data-loaded","1");}
  document.getElementById("pdfModal").style.display="block";
}
function closePdf(){document.getElementById("pdfModal").style.display="none";}
function closePdfOutside(e){if(e.target===document.getElementById("pdfModal"))closePdf();}
function resetAll(){
  if(!confirm("本当にリセットしますか？\n全ての学習記録・レベル・苦手リストが消えます。"))return;
  localStorage.clear();location.reload();
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];
  }
}
function shuffleRet(arr){const a=[...arr];shuffle(a);return a;}

(function init(){
  loadAll();updateChar();updateMini();updateMistakeBtn();applyAndStart();
})();
</script>
